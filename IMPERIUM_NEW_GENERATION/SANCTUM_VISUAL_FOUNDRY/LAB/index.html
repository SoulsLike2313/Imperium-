<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Foundry Mechanicus Slice V0.1</title>
    <link rel="stylesheet" href="../TOKENS/design_tokens_mechanicus_console_v0_1.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-nebula" aria-hidden="true"></div>
    <div class="bg-grid" aria-hidden="true"></div>

    <div class="shell">
      <header class="truth-strip">
        <div class="truth-head">
          <div class="eyebrow" id="eyebrow"></div>
          <h1 id="mainTitle"></h1>
          <p id="mission"></p>
        </div>
        <div class="truth-chips" id="truthChips"></div>
        <div class="truth-actions">
          <button type="button" id="langSwitch" class="pill-btn">EN</button>
          <button type="button" id="rawToggle" class="pill-btn pill-btn-warn">RAW OFF</button>
        </div>
      </header>

      <main class="layout">
        <section class="panel brain-side">
          <div class="panel-header">
            <h2 id="brainTitle"></h2>
            <div class="brain-status" id="brainStatus"></div>
          </div>
          <p class="panel-note" id="brainNote"></p>

          <div class="brain-field" id="brainField">
            <div class="neural-core" id="neuralCore"></div>
            <div class="organ-grid" id="organGrid"></div>
          </div>

          <div class="work-card">
            <h3 id="workTitle"></h3>
            <div class="work-feed" id="workFeed"></div>
          </div>
        </section>

        <aside class="panel mechanicus-side" id="mechanicusPanel">
          <div class="panel-header">
            <h2 id="panelTitle"></h2>
            <span class="panel-tag" id="panelTag"></span>
          </div>
          <p class="panel-note" id="panelNote"></p>

          <div class="panel-block">
            <h3 id="toolsTitle"></h3>
            <div class="tool-list" id="toolList"></div>
          </div>

          <div class="panel-block">
            <h3 id="contourTitle"></h3>
            <div class="contour-list" id="contourList"></div>
          </div>

          <div class="panel-block">
            <h3 id="actionsTitle"></h3>
            <div class="action-grid" id="actionGrid"></div>
          </div>

          <div class="raw-mode is-hidden" id="rawMode">
            <h3 id="rawTitle"></h3>
            <pre id="rawText"></pre>
          </div>
        </aside>
      </main>

      <footer class="footer-strip" id="footerStrip"></footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
